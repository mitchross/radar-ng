# Adds the /v1/* (push tokens, watches) paths to the existing API HTTPRoute.
# The host below has to match your existing api.vanillax.me HTTPRoute and
# the gateway-external Gateway. external-dns label is required for
# CNAME creation (see radar-ng CLAUDE.md memory).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: radar-ng-api-workflows
  namespace: radar-ng
  labels:
    external-dns: "true"
spec:
  parentRefs:
    - name: gateway-external
      namespace: gateway-system
  hostnames:
    - "api.radar-ng.vanillax.me"
  rules:
    - matches:
        - path: { type: PathPrefix, value: /v1/push-tokens }
        - path: { type: PathPrefix, value: /v1/watches }
        - path: { type: PathPrefix, value: /v1/workflows }
      backendRefs:
        - name: radar-ng-api
          port: 8000
