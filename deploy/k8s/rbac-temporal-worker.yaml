# RBAC for the radar-ng Temporal worker.
#
# Required because the OpenMeteoSyncWorkflow creates Kubernetes Jobs to run
# the third-party `ghcr.io/open-meteo/open-meteo` binary. The activity uses
# the worker pod's ServiceAccount to talk to the apiserver.
#
# Scope: jobs + pods/log within the radar-ng namespace ONLY (Role, not
# ClusterRole). The worker has no need to read/write anywhere else.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: radar-ng-worker
  namespace: radar-ng
  labels:
    app: radar-ng-worker
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: radar-ng-worker
  namespace: radar-ng
  labels:
    app: radar-ng-worker
rules:
  # Create + watch + delete Jobs (open-meteo sync activity)
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  # Read pod status + logs (for the activity's log-tail on Job failure)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: radar-ng-worker
  namespace: radar-ng
  labels:
    app: radar-ng-worker
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: radar-ng-worker
subjects:
  - kind: ServiceAccount
    name: radar-ng-worker
    namespace: radar-ng
