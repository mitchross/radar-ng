  <text x="1058" y="378" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#211f1b">openmeteo-data</text>
  <text x="1058" y="396" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10.5" fill="#8c857a">shared api ↔ sync worker</text>

  <rect x="1042" y="420" width="180" height="52" rx="12" fill="#ffffff" stroke="#eee6d8" stroke-width="1.5"/>
