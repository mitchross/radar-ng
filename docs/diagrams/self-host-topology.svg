  <text x="1058" y="442" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#211f1b">basemap-data</text>
  <text x="1058" y="460" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10.5" fill="#8c857a">~1–2 GB pmtiles archive</text>

  <rect x="1042" y="484" width="180" height="52" rx="12" fill="#ffffff" stroke="#eee6d8" stroke-width="1.5"/>
  <rect x="1042" y="486" width="3" height="48" rx="1.5" fill="#b97a4a"/>
  <text x="1058" y="506" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#211f1b">temporal-pg-data</text>
  <text x="1058" y="524" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10.5" fill="#8c857a">workflow histories</text>

  <text x="1042" y="576" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10.5" fill="#8c857a">all weather data is disposable</text>
  <text x="1042" y="592" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10.5" fill="#8c857a">cache — regenerates from NOAA</text>

