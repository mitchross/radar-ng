name: build temporal-worker

# Auto-semver build & push for the radar-ng Temporal worker.
#
# The temporal Dockerfile COPYs all of backend/ into the image (every
# activity is registered on the radar-ng task queue), so any backend code
# change must rebuild this image — not just temporal/ + backend/shared/.
# Renovate watches the registry and PRs the talos manifest bump on each
# new :vX.Y.Z.

on:
  push:
    branches: [master]
    paths:
      - 'temporal/**'
      - 'backend/**'
      - '.gitea/workflows/build-temporal-worker.yml'
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute next semver from registry
        id: ver
        run: |
          set -euo pipefail
          REGISTRY="registry.vanillax.me"
          IMAGE="radar-ng-temporal-worker"
          LATEST=$(curl -sS "https://${REGISTRY}/v2/${IMAGE}/tags/list" \
            | jq -r '.tags[]?' \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -V \
            | tail -1 \
            || true)
          if [ -z "${LATEST:-}" ]; then
            NEXT="v1.0.0"
          else
            STRIPPED=${LATEST#v}
            MAJOR=${STRIPPED%%.*}
            REST=${STRIPPED#*.}
            MINOR=${REST%%.*}
            PATCH=${REST#*.}
            NEXT="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          echo "current=${LATEST:-none}"
          echo "next=$NEXT"
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"

      # docker-container driver is required for registry-backed BuildKit
      # cache (`cache-to: type=registry,...`). The legacy `docker` driver
      # has no cache export support, so every build was a full cold pip
      # compile (pysteps has no cp312 wheel and rebuilds from source).
      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: temporal/Dockerfile
          push: true
          tags: registry.vanillax.me/radar-ng-temporal-worker:${{ steps.ver.outputs.version }}
          labels: |
            org.opencontainers.image.source=https://gitea.vanillax.me/vanillax/radar-ng
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.ver.outputs.version }}
          cache-from: type=registry,ref=registry.vanillax.me/radar-ng-temporal-worker:buildcache
          cache-to: type=registry,ref=registry.vanillax.me/radar-ng-temporal-worker:buildcache,mode=max

      - name: Summary
        run: |
          echo "✅ Pushed registry.vanillax.me/radar-ng-temporal-worker:${{ steps.ver.outputs.version }}"
          echo "Renovate will pick this up on its next scan and PR the bump in talos."
