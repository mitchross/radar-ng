name: build base

# Shared Python base image. Every ingest-* and nowcast Dockerfile does
#   FROM registry.vanillax.me/radar-ng-base:latest
# so this workflow has to push :latest to the registry before any child
# image build will succeed on a fresh runner.
#
# Trigger: any change under backend/base/** (or the base requirements).
# After a push here, re-run a child workflow and it will pull the new base.

on:
  push:
    branches: [master]
    paths:
      - 'backend/base/**'
      - '.gitea/workflows/build-base.yml'
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute next semver from registry
        id: ver
        run: |
          set -euo pipefail
          REGISTRY="registry.vanillax.me"
          IMAGE="radar-ng-base"
          LATEST=$(curl -sS "https://${REGISTRY}/v2/${IMAGE}/tags/list" \
            | jq -r '.tags[]?' \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -V | tail -1 || true)
          if [ -z "${LATEST:-}" ]; then NEXT="v1.0.0"; else
            S=${LATEST#v}; MAJ=${S%%.*}; R=${S#*.}; MIN=${R%%.*}; PAT=${R#*.}
            NEXT="v${MAJ}.${MIN}.$((PAT + 1))"
          fi
          echo "current=${LATEST:-none}; next=$NEXT"
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/base/Dockerfile
          push: true
          tags: |
            registry.vanillax.me/radar-ng-base:${{ steps.ver.outputs.version }}
            registry.vanillax.me/radar-ng-base:latest
          labels: |
            org.opencontainers.image.source=https://gitea.vanillax.me/vanillax/radar-ng
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.ver.outputs.version }}

      - run: echo "✅ Pushed registry.vanillax.me/radar-ng-base:${{ steps.ver.outputs.version }} — re-run any failed child workflows now."
