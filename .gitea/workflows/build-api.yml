name: build api

# Auto-semver build & push for the tile-server (Caddy + FastAPI) image.
#
# RESTORED 2026-06-11: this was removed in 95767c3 alongside the genuinely
# dead per-service ingest builds, but radar-ng-tile-server is NOT a zombie —
# the talos repo's deployment-tile-server.yaml pins it (v1.0.10 at time of
# restore) and it serves every /api/* and /v1/* route. With no workflow,
# backend/api changes produced no image and Renovate had nothing to bump.
#
# Flow:
#   1. Read existing :vX.Y.Z tags from registry.vanillax.me
#   2. Bump patch by 1 (or start at v1.0.0 if no semver tag exists)
#   3. Build the image (BuildKit registry cache, same as temporal-worker)
#   4. Push :vX.Y.Z + :latest
#
# Renovate (configured in talos-argocd-proxmox/.github/renovate.json5)
# scans the registry hourly, sees the new :v1.0.X, opens an auto-merging
# PR in the talos repo bumping deployment-tile-server.yaml. ArgoCD then
# rolls the cluster.

on:
  push:
    branches: [master]
    # Everything the Dockerfile COPYs (context is backend/): api/api,
    # shared/, api/Caddyfile, basemap/styles/. The pre-removal workflow
    # missed backend/shared/** — a shared-module change silently didn't
    # rebuild the API image.
    paths:
      - 'backend/api/**'
      - 'backend/shared/**'
      - 'backend/basemap/styles/**'
      - '.gitea/workflows/build-api.yml'
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute next semver from registry
        id: ver
        run: |
          set -euo pipefail
          REGISTRY="registry.vanillax.me"
          IMAGE="radar-ng-tile-server"
          LATEST=$(curl -sS "https://${REGISTRY}/v2/${IMAGE}/tags/list" \
            | jq -r '.tags[]?' \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -V \
            | tail -1 \
            || true)
          if [ -z "${LATEST:-}" ]; then
            NEXT="v1.0.0"
          else
            STRIPPED=${LATEST#v}
            MAJOR=${STRIPPED%%.*}
            REST=${STRIPPED#*.}
            MINOR=${REST%%.*}
            PATCH=${REST#*.}
            NEXT="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          echo "current=${LATEST:-none}"
          echo "next=$NEXT"
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"

      # docker-container driver is required for registry-backed BuildKit
      # cache (`cache-to: type=registry,...`) — same rationale as
      # build-temporal-worker.yml.
      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/api/Dockerfile
          push: true
          tags: |
            registry.vanillax.me/radar-ng-tile-server:${{ steps.ver.outputs.version }}
            registry.vanillax.me/radar-ng-tile-server:latest
          labels: |
            org.opencontainers.image.source=https://gitea.vanillax.me/vanillax/radar-ng
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.ver.outputs.version }}
          cache-from: type=registry,ref=registry.vanillax.me/radar-ng-tile-server:buildcache
          cache-to: type=registry,ref=registry.vanillax.me/radar-ng-tile-server:buildcache,mode=max

      - name: Summary
        run: |
          echo "✅ Pushed registry.vanillax.me/radar-ng-tile-server:${{ steps.ver.outputs.version }}"
          echo "Renovate will pick this up on its next scan and PR the bump in talos."
