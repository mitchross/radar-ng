name: build basemap

# basemap is a special case:
#   - context is the repo root (.) not services/, because the Dockerfile
#     COPYs pmtiles-data/basemap.pmtiles into the image
#   - watches pmtiles-data/** so a fresh PMTiles archive triggers a rebuild
#   - does NOT watch services/base/ since basemap doesn't FROM stormscope-base

on:
  push:
    branches: [master]
    paths:
      - 'services/basemap/**'
      - 'pmtiles-data/**'
      - '.gitea/workflows/build-basemap.yml'
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute next semver from registry
        id: ver
        run: |
          set -euo pipefail
          REGISTRY="registry.vanillax.me"
          IMAGE="radar-ng-basemap"
          LATEST=$(curl -sS "https://${REGISTRY}/v2/${IMAGE}/tags/list" \
            | jq -r '.tags[]?' \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -V | tail -1 || true)
          if [ -z "${LATEST:-}" ]; then NEXT="v1.0.0"; else
            S=${LATEST#v}; MAJ=${S%%.*}; R=${S#*.}; MIN=${R%%.*}; PAT=${R#*.}
            NEXT="v${MAJ}.${MIN}.$((PAT + 1))"
          fi
          echo "current=${LATEST:-none}; next=$NEXT"
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/basemap/Dockerfile
          push: true
          tags: |
            registry.vanillax.me/radar-ng-basemap:${{ steps.ver.outputs.version }}
            registry.vanillax.me/radar-ng-basemap:latest
          labels: |
            org.opencontainers.image.source=https://gitea.vanillax.me/vanillax/radar-ng
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.ver.outputs.version }}
          cache-from: type=registry,ref=registry.vanillax.me/radar-ng-basemap:buildcache
          cache-to:   type=registry,ref=registry.vanillax.me/radar-ng-basemap:buildcache,mode=max

      - run: echo "✅ Pushed registry.vanillax.me/radar-ng-basemap:${{ steps.ver.outputs.version }}"
