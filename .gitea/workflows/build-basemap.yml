name: build basemap

# basemap is a special case:
#   - The CONUS PMTiles archive (backend/pmtiles-data/basemap.pmtiles, ~1.8GB)
#     is .gitignore'd because it's too large for git, so a fresh `actions/checkout`
#     never has it. Before docker-build we extract /data/basemap.pmtiles from
#     the existing radar-ng-basemap:latest image — the registry is the source
#     of truth for the archive.
#   - First-ever build (no :latest in registry) must be primed by a local
#     `docker push registry.vanillax.me/radar-ng-basemap:latest`.
#   - context is the repo root (.) not backend/, because the Dockerfile
#     COPYs backend/pmtiles-data/basemap.pmtiles into the image
#   - does NOT watch backend/base/ since basemap doesn't FROM radar-ng-base

on:
  push:
    branches: [master]
    paths:
      - 'backend/basemap/**'
      - 'backend/pmtiles-data/**'
      - '.gitea/workflows/build-basemap.yml'
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute next semver from registry
        id: ver
        run: |
          set -euo pipefail
          REGISTRY="registry.vanillax.me"
          IMAGE="radar-ng-basemap"
          LATEST=$(curl -sS "https://${REGISTRY}/v2/${IMAGE}/tags/list" \
            | jq -r '.tags[]?' \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -V | tail -1 || true)
          if [ -z "${LATEST:-}" ]; then NEXT="v1.0.0"; else
            S=${LATEST#v}; MAJ=${S%%.*}; R=${S#*.}; MIN=${R%%.*}; PAT=${R#*.}
            NEXT="v${MAJ}.${MIN}.$((PAT + 1))"
          fi
          echo "current=${LATEST:-none}; next=$NEXT"
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Hydrate PMTiles archive from current basemap:latest
        run: |
          set -euo pipefail
          REF="registry.vanillax.me/radar-ng-basemap:latest"
          mkdir -p backend/pmtiles-data
          docker pull "$REF"
          cid=$(docker create "$REF")
          trap 'docker rm "$cid" >/dev/null' EXIT
          docker cp "$cid:/data/basemap.pmtiles" backend/pmtiles-data/basemap.pmtiles
          ls -lh backend/pmtiles-data/basemap.pmtiles

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/basemap/Dockerfile
          push: true
          tags: |
            registry.vanillax.me/radar-ng-basemap:${{ steps.ver.outputs.version }}
            registry.vanillax.me/radar-ng-basemap:latest
          labels: |
            org.opencontainers.image.source=https://gitea.vanillax.me/vanillax/radar-ng
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.ver.outputs.version }}

      - run: echo "✅ Pushed registry.vanillax.me/radar-ng-basemap:${{ steps.ver.outputs.version }}"
