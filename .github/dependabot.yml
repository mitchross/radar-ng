version: 2

updates:
  - package-ecosystem: pip
    directories:
      - "**/*"
    schedule:
      interval: weekly
    groups:
      python-by-dependency:
        group-by: dependency-name
    open-pull-requests-limit: 10

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 10

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 10
