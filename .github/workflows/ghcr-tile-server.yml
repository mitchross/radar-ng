name: ghcr · tile-server

# Public GHCR mirror of the tile-server (Caddy + FastAPI) image.
# The Gitea workflow (.gitea/workflows/build-api.yml) still publishes the
# private homelab copy to registry.vanillax.me — this one is the public build
# on GitHub-hosted runners. Runs on push to master, or manually with an
# explicit version.
#
# Auth: GITHUB_TOKEN (packages: write) can push to ghcr.io/<owner>/*; no PAT
# needed. After the first push, set the package visibility to Public in the
# repo's Packages settings so users can pull without auth.

on:
  push:
    branches: [master]
    paths:
      - 'backend/api/**'
      - 'backend/shared/**'
      - 'backend/basemap/styles/**'
      - '.github/workflows/ghcr-tile-server.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Optional explicit version tag to publish (e.g. v1.2.3)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/radar-ng-tile-server
          # master push -> :latest + :sha-<short>. Manual run with a version
          # input -> also that tag. metadata-action auto-adds the
          # org.opencontainers.image.{source,revision,version} labels.
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=raw,value=${{ github.event.inputs.version }},enable=${{ github.event.inputs.version != '' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          provenance: false
          context: backend
          file: backend/api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
