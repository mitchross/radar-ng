name: ghcr · open-meteo-worker

# Public GHCR mirror of the secondary (open_meteo_sync) worker image.

on:
  push:
    branches: [master]
    paths:
      - 'temporal/open_meteo_worker.py'
      - 'temporal/open_meteo_worker.Dockerfile'
      - 'temporal/requirements.txt'
      - 'backend/open_meteo_sync/**'
      - 'backend/shared/logger.py'
      - '.github/workflows/ghcr-open-meteo-worker.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Optional explicit version tag to publish (e.g. v1.2.3)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Compute next semver from registry
        id: ver
        run: |
          set -euo pipefail
          IMAGE="radar-ng-open-meteo-worker"
          if [ -n "${{ github.event.inputs.version }}" ]; then
            NEXT="${{ github.event.inputs.version }}"
          else
            TOKEN=$(curl -s "https://ghcr.io/token?scope=repository:${{ github.repository_owner }}/${IMAGE}:pull" | jq -r .token)
            LATEST=$(curl -s -H "Authorization: Bearer $TOKEN" "https://ghcr.io/v2/${{ github.repository_owner }}/${IMAGE}/tags/list" \
              | jq -r '.tags[]?' \
              | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
              | sort -V \
              | tail -1 \
              || true)
            if [ -z "${LATEST:-}" ]; then
              NEXT="v1.1.5"
            else
              STRIPPED=${LATEST#v}
              MAJOR=${STRIPPED%%.*}
              REST=${STRIPPED#*.}
              MINOR=${REST%%.*}
              PATCH=${REST#*.}
              NEXT="v${MAJOR}.${MINOR}.$((PATCH + 1))"
            fi
          fi
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Calculated version: $NEXT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/radar-ng-open-meteo-worker
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=raw,value=${{ steps.ver.outputs.version }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          provenance: false
          context: .
          file: temporal/open_meteo_worker.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
