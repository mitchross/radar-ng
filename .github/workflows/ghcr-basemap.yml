name: ghcr · basemap

# basemap is a special case:
#   - The CONUS PMTiles archive (backend/pmtiles-data/basemap.pmtiles, ~1.8GB)
#     is .gitignore'd because it's too large for git, so a fresh `actions/checkout`
#     never has it. Before docker-build we extract /data/basemap.pmtiles from
#     the existing radar-ng-basemap:latest image — the registry is the source
#     of truth for the archive.
#   - First-ever build (no :latest in registry) must be primed by seeding it.
#   - context is the repo root (.) not backend/, because the Dockerfile
#     COPYs backend/pmtiles-data/basemap.pmtiles into the image

on:
  push:
    branches: [master]
    paths:
      - 'backend/basemap/**'
      - 'backend/pmtiles-data/**'
      - '.github/workflows/ghcr-basemap.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Optional explicit version tag to publish (e.g. v1.2.3)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - name: Compute next semver from registry
        id: ver
        run: |
          set -euo pipefail
          IMAGE="radar-ng-basemap"
          if [ -n "${{ github.event.inputs.version }}" ]; then
            NEXT="${{ github.event.inputs.version }}"
          else
            TOKEN=$(curl -s "https://ghcr.io/token?scope=repository:${{ github.repository_owner }}/${IMAGE}:pull" | jq -r .token)
            LATEST=$(curl -s -H "Authorization: Bearer $TOKEN" "https://ghcr.io/v2/${{ github.repository_owner }}/${IMAGE}/tags/list" \
              | jq -r '.tags[]?' \
              | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
              | sort -V \
              | tail -1 \
              || true)
            if [ -z "${LATEST:-}" ]; then
              NEXT="v1.1.5"
            else
              STRIPPED=${LATEST#v}
              MAJOR=${STRIPPED%%.*}
              REST=${STRIPPED#*.}
              MINOR=${REST%%.*}
              PATCH=${REST#*.}
              NEXT="v${MAJOR}.${MINOR}.$((PATCH + 1))"
            fi
          fi
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Calculated version: $NEXT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          # Existing package predates this repository link. The bootstrap
          # credential is temporary and removed after this push attaches the
          # OCI source label; normal builds continue to use GITHUB_TOKEN.
          password: ${{ secrets.GHCR_BOOTSTRAP_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Hydrate PMTiles archive from current basemap:latest
        run: |
          set -euo pipefail
          REF="ghcr.io/${{ github.repository_owner }}/radar-ng-basemap:latest"
          mkdir -p backend/pmtiles-data
          docker pull "$REF"
          cid=$(docker create "$REF")
          trap 'docker rm "$cid" >/dev/null' EXIT
          docker cp "$cid:/data/basemap.pmtiles" backend/pmtiles-data/basemap.pmtiles
          ls -lh backend/pmtiles-data/basemap.pmtiles

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/radar-ng-basemap
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=raw,value=${{ steps.ver.outputs.version }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          provenance: false
          context: .
          file: backend/basemap/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
