name: ghcr · temporal-worker

# Public GHCR mirror of the main Temporal worker image. The Gitea workflow
# still publishes the private copy to registry.vanillax.me. See
# .github/workflows/ghcr-tile-server.yml for the auth / visibility notes.
#
# The temporal Dockerfile COPYs all of backend/ into the image, so any
# backend change (not just temporal/) must rebuild it.

on:
  push:
    branches: [master]
    paths:
      - 'temporal/**'
      - 'backend/**'
      - '.github/workflows/ghcr-temporal-worker.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Optional explicit version tag to publish (e.g. v1.2.3)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/radar-ng-temporal-worker
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=raw,value=${{ github.event.inputs.version }},enable=${{ github.event.inputs.version != '' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          provenance: false
          context: .
          file: temporal/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
