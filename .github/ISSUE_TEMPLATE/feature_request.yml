name: Feature request
description: Suggest a new layer, capability, or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What's the problem or use case?
      description: What are you trying to do that radar-ng doesn't support today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? A new data layer, an app feature, a config knob?
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
